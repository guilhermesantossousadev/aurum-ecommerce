name: Deploy automático React Vite para Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Limpar public_html na Hostinger
        uses: sebastianpopp/ftp-action@v2
        with:
          host: 46.17.175.80
          user: u164307256
          password: ${{ secrets.FTP_PASSWORD }}
          command: |
            rm -rf public_html/*

      - name: Enviar build via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 46.17.175.80
          username: u164307256
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: public_html/
