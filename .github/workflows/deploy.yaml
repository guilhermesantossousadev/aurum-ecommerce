name: Deploy automático React Vite para Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Limpar public_html na Hostinger via lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -c "
            open -u u164307256,${{ secrets.FTP_PASSWORD }} 46.17.175.80
            mirror -R --delete --only-newer --verbose ./empty_folder/ public_html
            rm -r public_html/*
            quit
          "

      - name: Enviar build via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 46.17.175.80
          username: u164307256
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: public_html/
